<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Scientific Computing Metaverse</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: sans-serif;
      background: #000;
    }

    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #fff;
      z-index: 10;
      background: rgba(0, 0, 0, 0.4);
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 14px;
      line-height: 1.5;
      max-width: 360px;
    }

    /* Restart buttons */
    .restart-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 10px 16px;
      border-radius: 8px;
      background: #1e5df8;
      color: white;
      font-family: sans-serif;
      font-size: 14px;
      border: none;
      cursor: pointer;
      display: none; /* shown only by JS */
      opacity: 0.9;
      z-index: 9999;
    }

    .restart-btn:hover {
      opacity: 1;
      background: #3a7bff;
    }
  </style>
</head>

<body>
  <div id="info">
    <b>Scientific Computing Metaverse</b><br/><br/>
    <u>Navigation</u><br/>
    • Drag to look around<br/>
    • Scroll to zoom<br/><br/>
  </div>

  <!-- Restart Buttons -->
  <button id="restartVideoBtn" class="restart-btn">Restart Video</button>
  <button id="restartAudioBtn" class="restart-btn">Restart Audio</button>

  <!-- Three.js core -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.140.0/build/three.min.js"></script>

  <!-- OrbitControls -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.140.0/examples/js/controls/OrbitControls.js"></script>

  <!-- GLTFLoader -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.140.0/examples/js/loaders/GLTFLoader.js"></script>

  <!-- Main JS -->
  <script src="main.js?v=1001"></script>
</body>
</html>
